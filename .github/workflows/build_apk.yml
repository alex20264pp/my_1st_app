name: Build Flet APK
on:
  push:
    branches: [ main ] # Si attiva quando fai un push su main
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installazione Flet e dipendenze
        run: |
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build APK
        run: |
          # Questo comando genera l'APK. 
          # Nota: 'flet build apk' richiede Flutter, che l'action gestisce automaticamente.
          flet build apk --verbose

      - name: Caricamento Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-app-apk
          path: build/apk/*.apk